# ==============================================================
# CONFIGURAÇÃO DO BANCO DE DADOS (MySQL)
# ==============================================================

# A sintaxe ${VAR:DEFAULT} tenta ler a variável do sistema. 
# Se não existir (local), usa o valor padrão após os dois pontos.

spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQL_ROOT_PASSWORD}

# Drive e Dialeto
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================
# CONFIGURAÇÃO DO JPA / HIBERNATE
# ==============================================================

# 'update' cria as tabelas automaticamente se não existirem
spring.jpa.hibernate.ddl-auto=update

# Mostra as queries SQL no log (útil para debug)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Resolve o aviso (WARN) de 'open-in-view' que apareceu nos seus logs
spring.jpa.open-in-view=false

# ==============================================================
# CONFIGURAÇÃO DO SERVIDOR
# ==============================================================

# A Railway define a porta automaticamente. Se não existir, usa 8080.
server.port=${PORT:8080}